# Define your entities here

type User {
  id: ID!
  name: String!
  email: String!
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!        # Relationship, not authorId
  comments: [Comment!]!
  createdAt: String
}

type Comment {
  id: ID!
  text: String!
  author: User!
  postId: String!
}

# Extend root Query type to add blogs-related queries

extend type Query {
  users: [User!]!
  user(id: ID!): User
  posts: [Post!]!
  post(id: ID!): Post!
  comments(postId: ID!): [Comment!]!
   commentsByPost(postId: ID!): [Comment!]!
   commentsByUser(userId: ID!): [Comment!]!
}

type Mutation {
  createPost(title: String!, content: String!, authorId: ID!): Post!
  createComment(text: String!, postId: ID!, authorId: ID!): Comment!
}